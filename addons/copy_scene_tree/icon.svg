<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">

  <!-- Background rounded square -->
  <rect width="128" height="128" rx="18" fill="#1e1e2e"/>

  <!-- ── Tree connector lines ── -->
  <!-- Vertical trunk from root down -->
  <line x1="30" y1="42" x2="30" y2="98" stroke="#555570" stroke-width="3" stroke-linecap="round"/>
  <!-- Horizontal branch to child 1 -->
  <line x1="30" y1="62" x2="46" y2="62" stroke="#555570" stroke-width="3" stroke-linecap="round"/>
  <!-- Horizontal branch to child 2 -->
  <line x1="30" y1="82" x2="46" y2="82" stroke="#555570" stroke-width="3" stroke-linecap="round"/>
  <!-- Horizontal branch to child 3 (last) -->
  <line x1="30" y1="98" x2="46" y2="98" stroke="#555570" stroke-width="3" stroke-linecap="round"/>

  <!-- ── Root node ── -->
  <rect x="10" y="18" width="60" height="24" rx="6" fill="#478cbf"/>
  <rect x="10" y="18" width="60" height="24" rx="6" fill="none" stroke="#6ab0e0" stroke-width="1.5"/>
  <!-- Root node label lines (simulated text) -->
  <rect x="18" y="25" width="28" height="4" rx="2" fill="#cce8ff" opacity="0.9"/>
  <rect x="18" y="32" width="20" height="3" rx="1.5" fill="#8bbdd9" opacity="0.7"/>

  <!-- ── Child node 1 ── -->
  <rect x="46" y="50" width="68" height="22" rx="5" fill="#2d4a2d"/>
  <rect x="46" y="50" width="68" height="22" rx="5" fill="none" stroke="#5a9e5a" stroke-width="1.5"/>
  <rect x="54" y="56" width="24" height="3.5" rx="1.5" fill="#a8d8a8" opacity="0.9"/>
  <rect x="54" y="62" width="16" height="3" rx="1.5" fill="#6aaa6a" opacity="0.7"/>

  <!-- ── Child node 2 ── -->
  <rect x="46" y="71" width="68" height="22" rx="5" fill="#2d4a2d"/>
  <rect x="46" y="71" width="68" height="22" rx="5" fill="none" stroke="#5a9e5a" stroke-width="1.5"/>
  <rect x="54" y="77" width="28" height="3.5" rx="1.5" fill="#a8d8a8" opacity="0.9"/>
  <rect x="54" y="83" width="18" height="3" rx="1.5" fill="#6aaa6a" opacity="0.7"/>

  <!-- ── Child node 3 (with script badge) ── -->
  <rect x="46" y="87" width="68" height="22" rx="5" fill="#2d4a2d"/>
  <rect x="46" y="87" width="68" height="22" rx="5" fill="none" stroke="#5a9e5a" stroke-width="1.5"/>
  <rect x="54" y="93" width="22" height="3.5" rx="1.5" fill="#a8d8a8" opacity="0.9"/>
  <rect x="54" y="99" width="14" height="3" rx="1.5" fill="#6aaa6a" opacity="0.7"/>

  <!-- ── Script badge on root node (top-right corner) ── -->
  <!-- Badge background -->
  <rect x="62" y="10" width="56" height="36" rx="7" fill="#1e1e2e" stroke="#f4c97e" stroke-width="2"/>
  <!-- Clipboard body -->
  <rect x="68" y="16" width="38" height="26" rx="4" fill="#3a3520"/>
  <!-- Clipboard clip at top -->
  <rect x="78" y="12" width="18" height="8" rx="3" fill="#2a2515" stroke="#f4c97e" stroke-width="1.5"/>
  <!-- Script lines on clipboard -->
  <rect x="73" y="23" width="26" height="3" rx="1.5" fill="#f4c97e" opacity="0.9"/>
  <rect x="73" y="29" width="20" height="3" rx="1.5" fill="#f4c97e" opacity="0.6"/>
  <rect x="73" y="35" width="22" height="3" rx="1.5" fill="#f4c97e" opacity="0.6"/>

</svg>
