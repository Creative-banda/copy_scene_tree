<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Root node -->
  <rect x="1" y="1" width="6" height="4" rx="1" fill="#7ecef4"/>
  <!-- Child connector lines -->
  <line x1="4" y1="5" x2="4" y2="8" stroke="#aaa" stroke-width="1"/>
  <line x1="4" y1="8" x2="6" y2="8" stroke="#aaa" stroke-width="1"/>
  <line x1="4" y1="8" x2="6" y2="11" stroke="#aaa" stroke-width="1"/>
  <!-- Child node 1 -->
  <rect x="6" y="6" width="8" height="3" rx="1" fill="#a8d8a8"/>
  <!-- Child node 2 -->
  <rect x="6" y="10" width="8" height="3" rx="1" fill="#a8d8a8"/>
  <!-- Clipboard hint -->
  <rect x="10" y="0" width="5" height="6" rx="1" fill="none" stroke="#f4c97e" stroke-width="1"/>
  <line x1="11" y1="2" x2="14" y2="2" stroke="#f4c97e" stroke-width="0.8"/>
  <line x1="11" y1="3.5" x2="14" y2="3.5" stroke="#f4c97e" stroke-width="0.8"/>
